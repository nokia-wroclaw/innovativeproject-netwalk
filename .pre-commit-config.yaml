# .pre-commit-config.yaml

# odpal `just intall-hooks` żeby zainstalować

default_language_version:
  python: python3.12

repos:
  # BACKEND
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-format
        name: "ruff format (backend)"
        files: ^backend/.*\.py$
        exclude: ^backend/\.venv/
        args: [--config, backend/pyproject.toml]

      - id: ruff
        name: "ruff check (backend)"
        files: ^backend/.*\.py$
        exclude: ^backend/\.venv/
        args: [--config, backend/pyproject.toml, --fix]

  # ANDROID
  - repo: local
    hooks:
      - id: ktlint-format
        name: "ktlint format (android)"
        entry: bash -c 'cd androidApp && ./gradlew ktlintFormat'
        language: system
        pass_filenames: false
        files: ^androidApp/.*\.(kt|kts)$

      - id: ktlint-check
        name: "ktlint check (android)"
        entry: bash -c 'cd androidApp && ./gradlew ktlintCheck'
        language: system
        pass_filenames: false
        files: ^androidApp/.*\.(kt|kts)$

  # FRONTEND
  # TODO: add js formatter/linter

  # GLOBAL
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
        # exclude python and kotlin (already handled by other formatters)
        exclude: ^backend/.*\.py$|^androidApp/.*\.(kt|kts)$
      - id: end-of-file-fixer
        exclude: ^backend/.*\.py$|^androidApp/.*\.(kt|kts)$
      - id: check-yaml
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: no-commit-to-branch
        args:
          - "--branch"
          - main
          - "--branch"
          - develop
        always_run: true
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
        name: "gitleaks (secret scanning)"
        exclude: ^backend/\.env\.example$
